<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 780" font-family="'Segoe UI', system-ui, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#475569"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#3b82f6"/>
    </marker>
    <linearGradient id="sensor-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="fusion-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="mlp-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d1fae5"/>
      <stop offset="100%" stop-color="#a7f3d0"/>
    </linearGradient>
    <linearGradient id="mcp-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#ddd6fe"/>
    </linearGradient>
    <linearGradient id="cmd-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fce7f3"/>
      <stop offset="100%" stop-color="#fbcfe8"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="360" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Navigation Architecture — Two-Tier Brain</text>

  <!-- ═══ SENSORS ═══ -->
  <g filter="url(#shadow)">
    <rect x="40" y="55" width="640" height="110" rx="12" fill="url(#sensor-grad)" stroke="#93c5fd" stroke-width="1.5"/>
  </g>
  <text x="60" y="78" font-size="11" font-weight="600" fill="#1e40af" letter-spacing="1">SENSORS · 100+ Hz</text>

  <!-- IMU -->
  <rect x="70" y="90" width="120" height="50" rx="8" fill="#fff" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="130" y="113" text-anchor="middle" font-weight="600" fill="#1e40af">IMU</text>
  <text x="130" y="130" text-anchor="middle" font-size="10" fill="#64748b">acc + gyro (6-DOF)</text>

  <!-- LiDAR -->
  <rect x="210" y="90" width="120" height="50" rx="8" fill="#fff" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="270" y="113" text-anchor="middle" font-weight="600" fill="#1e40af">LiDAR</text>
  <text x="270" y="130" text-anchor="middle" font-size="10" fill="#64748b">depth grid</text>

  <!-- Wheels -->
  <rect x="350" y="90" width="120" height="50" rx="8" fill="#fff" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="410" y="113" text-anchor="middle" font-weight="600" fill="#1e40af">Wheels</text>
  <text x="410" y="130" text-anchor="middle" font-size="10" fill="#64748b">ticks + slip</text>

  <!-- Odometry -->
  <rect x="490" y="90" width="140" height="50" rx="8" fill="#fff" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="560" y="113" text-anchor="middle" font-weight="600" fill="#1e40af">Odometry</text>
  <text x="560" y="130" text-anchor="middle" font-size="10" fill="#64748b">x, y, θ (N-wheel)</text>

  <!-- Arrows from sensors to fusion -->
  <line x1="130" y1="140" x2="130" y2="175" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="270" y1="140" x2="270" y2="175" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="410" y1="140" x2="410" y2="175" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="560" y1="140" x2="560" y2="175" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ═══ STATE FUSION ═══ -->
  <g filter="url(#shadow)">
    <rect x="140" y="180" width="440" height="50" rx="10" fill="url(#fusion-grad)" stroke="#f59e0b" stroke-width="1.5"/>
  </g>
  <text x="360" y="203" text-anchor="middle" font-weight="700" fill="#92400e">State Fusion</text>
  <text x="360" y="220" text-anchor="middle" font-size="10" fill="#78350f">EKF / complementary filter · normalize to [−1, 1]</text>

  <!-- Arrow fusion → MLP cascade -->
  <line x1="360" y1="230" x2="360" y2="260" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ═══ MLP CASCADE ═══ -->
  <g filter="url(#shadow)">
    <rect x="80" y="265" width="560" height="310" rx="14" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  </g>
  <text x="100" y="290" font-size="11" font-weight="600" fill="#166534" letter-spacing="1">MLP CASCADE · LOCAL BRAIN · ~0.1ms</text>

  <!-- MLP-Percept -->
  <g filter="url(#shadow)">
    <rect x="130" y="305" width="460" height="100" rx="10" fill="url(#mlp-grad)" stroke="#34d399" stroke-width="1.5"/>
  </g>
  <text x="360" y="330" text-anchor="middle" font-weight="700" font-size="14" fill="#065f46">MLP-Percept</text>
  <text x="360" y="350" text-anchor="middle" font-size="12" fill="#065f46">"What's around me?"</text>

  <!-- Percept architecture boxes -->
  <rect x="165" y="362" width="80" height="30" rx="6" fill="#fff" stroke="#10b981" stroke-width="1"/>
  <text x="205" y="382" text-anchor="middle" font-size="11" fill="#065f46" font-weight="600">42 input</text>
  <text x="205" y="394" text-anchor="middle" font-size="9" fill="#64748b">linear</text>

  <line x1="245" y1="377" x2="275" y2="377" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="280" y="362" width="80" height="30" rx="6" fill="#fff" stroke="#10b981" stroke-width="1"/>
  <text x="320" y="382" text-anchor="middle" font-size="11" fill="#065f46" font-weight="600">16 hidden</text>
  <text x="320" y="394" text-anchor="middle" font-size="9" fill="#64748b">tanh</text>

  <line x1="360" y1="377" x2="390" y2="377" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="395" y="362" width="80" height="30" rx="6" fill="#fff" stroke="#10b981" stroke-width="1"/>
  <text x="435" y="382" text-anchor="middle" font-size="11" fill="#065f46" font-weight="600">8 output</text>
  <text x="435" y="394" text-anchor="middle" font-size="9" fill="#64748b">tanh</text>

  <text x="540" y="382" font-size="10" fill="#065f46" font-weight="600">824 params</text>

  <!-- Arrow Percept → Decide -->
  <line x1="360" y1="405" x2="360" y2="430" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="380" y="422" font-size="10" fill="#475569" font-style="italic">8 learned features</text>

  <!-- MLP-Decide -->
  <g filter="url(#shadow)">
    <rect x="130" y="435" width="460" height="100" rx="10" fill="url(#mlp-grad)" stroke="#34d399" stroke-width="1.5"/>
  </g>
  <text x="360" y="460" text-anchor="middle" font-weight="700" font-size="14" fill="#065f46">MLP-Decide</text>
  <text x="360" y="480" text-anchor="middle" font-size="12" fill="#065f46">"What do I do?"</text>

  <!-- Decide architecture boxes -->
  <rect x="165" y="490" width="80" height="30" rx="6" fill="#fff" stroke="#10b981" stroke-width="1"/>
  <text x="205" y="510" text-anchor="middle" font-size="11" fill="#065f46" font-weight="600">21 input</text>
  <text x="205" y="522" text-anchor="middle" font-size="9" fill="#64748b">linear</text>

  <line x1="245" y1="505" x2="275" y2="505" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="280" y="490" width="80" height="30" rx="6" fill="#fff" stroke="#10b981" stroke-width="1"/>
  <text x="320" y="510" text-anchor="middle" font-size="11" fill="#065f46" font-weight="600">16 hidden</text>
  <text x="320" y="522" text-anchor="middle" font-size="9" fill="#64748b">tanh</text>

  <line x1="360" y1="505" x2="390" y2="505" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="395" y="490" width="80" height="30" rx="6" fill="#fff" stroke="#10b981" stroke-width="1"/>
  <text x="435" y="510" text-anchor="middle" font-size="11" fill="#065f46" font-weight="600">4 output</text>
  <text x="435" y="522" text-anchor="middle" font-size="9" fill="#64748b">sigmoid</text>

  <text x="540" y="510" font-size="10" fill="#065f46" font-weight="600">420 params</text>

  <!-- Side inputs to MLP-Decide -->
  <text x="95" y="470" font-size="10" fill="#475569" text-anchor="end">Pose (6)</text>
  <text x="95" y="485" font-size="10" fill="#475569" text-anchor="end">Slip (4)</text>
  <text x="95" y="500" font-size="10" fill="#475569" text-anchor="end">Goal (3)</text>
  <line x1="98" y1="485" x2="128" y2="485" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Arrow MLP → Command -->
  <line x1="360" y1="575" x2="360" y2="610" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ═══ NAVIGATION COMMAND ═══ -->
  <g filter="url(#shadow)">
    <rect x="170" y="615" width="380" height="45" rx="10" fill="url(#cmd-grad)" stroke="#ec4899" stroke-width="1.5"/>
  </g>
  <text x="360" y="637" text-anchor="middle" font-weight="700" fill="#9d174d">INavigationCommand</text>
  <text x="360" y="652" text-anchor="middle" font-size="10" fill="#831843">steer · throttle · brake · risk · escalate</text>

  <!-- Arrow Command → MCP (downsampled) -->
  <line x1="360" y1="660" x2="360" y2="700" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-blue)"/>
  <text x="385" y="685" font-size="10" fill="#7c3aed" font-style="italic">1–5 Hz downsampled</text>

  <!-- ═══ MCP / LLM ═══ -->
  <g filter="url(#shadow)">
    <rect x="160" y="705" width="400" height="55" rx="12" fill="url(#mcp-grad)" stroke="#8b5cf6" stroke-width="1.5"/>
  </g>
  <text x="360" y="730" text-anchor="middle" font-weight="700" fill="#5b21b6">MCP / LLM — Strategic Layer</text>
  <text x="360" y="748" text-anchor="middle" font-size="10" fill="#6d28d9">setGoal() · loadPerceptWeights() · loadDecisionWeights() · escalation</text>

  <!-- MCP feedback arrow -->
  <path d="M 565 730 Q 660 730 660 485 Q 660 290 595 290" fill="none" stroke="#8b5cf6" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow-blue)"/>
  <text x="668" y="490" font-size="9" fill="#7c3aed" transform="rotate(-90,668,490)">swap weights · set goal</text>

  <!-- Total params label -->
  <rect x="495" y="570" width="120" height="25" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="555" y="587" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">1,244 params</text>
</svg>
