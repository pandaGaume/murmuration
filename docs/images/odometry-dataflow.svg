<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" font-family="'Segoe UI', system-ui, sans-serif" font-size="13">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#475569"/>
    </marker>
    <marker id="a-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#dc2626"/>
    </marker>
    <filter id="s" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#00000015"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="380" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#1e293b">Differential Odometry — N-Wheel Data Flow</text>

  <!-- ═══ LEFT SIDE WHEELS ═══ -->
  <text x="30" y="65" font-size="11" font-weight="600" fill="#1e40af" letter-spacing="0.5">LEFT SIDE</text>

  <g filter="url(#s)">
    <rect x="30" y="75" width="140" height="35" rx="6" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.2"/>
  </g>
  <text x="100" y="97" text-anchor="middle" font-weight="600" fill="#1e40af">left_front</text>

  <g filter="url(#s)">
    <rect x="30" y="118" width="140" height="35" rx="6" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.2"/>
  </g>
  <text x="100" y="140" text-anchor="middle" font-weight="600" fill="#1e40af">left_middle</text>

  <g filter="url(#s)">
    <rect x="30" y="161" width="140" height="35" rx="6" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.2"/>
  </g>
  <text x="100" y="183" text-anchor="middle" font-weight="600" fill="#1e40af">left_rear</text>

  <!-- ═══ RIGHT SIDE WHEELS ═══ -->
  <text x="30" y="230" font-size="11" font-weight="600" fill="#1e40af" letter-spacing="0.5">RIGHT SIDE</text>

  <g filter="url(#s)">
    <rect x="30" y="240" width="140" height="35" rx="6" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.2"/>
  </g>
  <text x="100" y="262" text-anchor="middle" font-weight="600" fill="#1e40af">right_front</text>

  <g filter="url(#s)">
    <rect x="30" y="283" width="140" height="35" rx="6" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.2"/>
  </g>
  <text x="100" y="305" text-anchor="middle" font-weight="600" fill="#1e40af">right_middle</text>

  <g filter="url(#s)">
    <rect x="30" y="326" width="140" height="35" rx="6" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.2"/>
  </g>
  <text x="100" y="348" text-anchor="middle" font-weight="600" fill="#1e40af">right_rear</text>

  <!-- ═══ SLIP FILTER — LEFT ═══ -->
  <line x1="170" y1="92" x2="220" y2="135" stroke="#475569" stroke-width="1.2" marker-end="url(#a)"/>
  <line x1="170" y1="135" x2="220" y2="135" stroke="#475569" stroke-width="1.2" marker-end="url(#a)"/>
  <line x1="170" y1="178" x2="220" y2="135" stroke="#475569" stroke-width="1.2" marker-end="url(#a)"/>

  <g filter="url(#s)">
    <rect x="225" y="110" width="130" height="50" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.2"/>
  </g>
  <text x="290" y="133" text-anchor="middle" font-weight="600" fill="#92400e">Slip Filter</text>
  <text x="290" y="150" text-anchor="middle" font-size="10" fill="#78350f">discard if ratio ≥ 0.3</text>

  <!-- ═══ SLIP FILTER — RIGHT ═══ -->
  <line x1="170" y1="257" x2="220" y2="300" stroke="#475569" stroke-width="1.2" marker-end="url(#a)"/>
  <line x1="170" y1="300" x2="220" y2="300" stroke="#475569" stroke-width="1.2" marker-end="url(#a)"/>
  <line x1="170" y1="343" x2="220" y2="300" stroke="#475569" stroke-width="1.2" marker-end="url(#a)"/>

  <g filter="url(#s)">
    <rect x="225" y="275" width="130" height="50" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.2"/>
  </g>
  <text x="290" y="298" text-anchor="middle" font-weight="600" fill="#92400e">Slip Filter</text>
  <text x="290" y="315" text-anchor="middle" font-size="10" fill="#78350f">discard if ratio ≥ 0.3</text>

  <!-- ═══ AVERAGE ═══ -->
  <line x1="355" y1="135" x2="395" y2="135" stroke="#475569" stroke-width="1.2" marker-end="url(#a)"/>
  <g filter="url(#s)">
    <rect x="400" y="115" width="70" height="40" rx="8" fill="#e0e7ff" stroke="#818cf8" stroke-width="1.2"/>
  </g>
  <text x="435" y="140" text-anchor="middle" font-weight="600" fill="#4338ca">AVG</text>

  <line x1="355" y1="300" x2="395" y2="300" stroke="#475569" stroke-width="1.2" marker-end="url(#a)"/>
  <g filter="url(#s)">
    <rect x="400" y="280" width="70" height="40" rx="8" fill="#e0e7ff" stroke="#818cf8" stroke-width="1.2"/>
  </g>
  <text x="435" y="305" text-anchor="middle" font-weight="600" fill="#4338ca">AVG</text>

  <!-- Labels -->
  <text x="445" y="110" font-size="10" fill="#475569" font-style="italic">dLeft</text>
  <text x="445" y="275" font-size="10" fill="#475569" font-style="italic">dRight</text>

  <!-- ═══ KINEMATICS ═══ -->
  <line x1="470" y1="135" x2="520" y2="210" stroke="#475569" stroke-width="1.3" marker-end="url(#a)"/>
  <line x1="470" y1="300" x2="520" y2="210" stroke="#475569" stroke-width="1.3" marker-end="url(#a)"/>

  <g filter="url(#s)">
    <rect x="525" y="170" width="195" height="80" rx="10" fill="#d1fae5" stroke="#34d399" stroke-width="1.5"/>
  </g>
  <text x="622" y="195" text-anchor="middle" font-weight="700" fill="#065f46">Differential</text>
  <text x="622" y="213" text-anchor="middle" font-weight="700" fill="#065f46">Kinematics</text>
  <text x="622" y="233" text-anchor="middle" font-size="10" fill="#065f46">midpoint arc integration</text>
  <text x="622" y="245" text-anchor="middle" font-size="9" fill="#475569">dCenter · dTheta · cos/sin</text>

  <!-- ═══ OUTPUT ═══ -->
  <line x1="622" y1="250" x2="622" y2="290" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>

  <g filter="url(#s)">
    <rect x="510" y="295" width="225" height="100" rx="10" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
  </g>
  <text x="622" y="318" text-anchor="middle" font-weight="700" font-size="14" fill="#9d174d">IOdometryEstimate</text>

  <text x="535" y="340" font-size="11" fill="#831843">x, y</text>
  <text x="535" y="356" font-size="11" fill="#831843">theta</text>
  <text x="535" y="372" font-size="11" fill="#831843">linearVelocity</text>
  <text x="535" y="388" font-size="11" fill="#831843">angularVelocity</text>

  <text x="680" y="340" font-size="10" fill="#64748b">meters</text>
  <text x="680" y="356" font-size="10" fill="#64748b">radians</text>
  <text x="680" y="372" font-size="10" fill="#64748b">m/s</text>
  <text x="680" y="388" font-size="10" fill="#64748b">rad/s</text>

  <!-- Reliable flag -->
  <g filter="url(#s)">
    <rect x="530" y="400" width="185" height="18" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  </g>
  <text x="622" y="414" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">reliable: false if all wheels slip</text>

  <!-- Quality badges -->
  <g filter="url(#s)">
    <rect x="30" y="385" width="100" height="25" rx="6" fill="#d1fae5" stroke="#34d399" stroke-width="1"/>
  </g>
  <text x="80" y="402" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">Good: 192</text>

  <g filter="url(#s)">
    <rect x="145" y="385" width="120" height="25" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  </g>
  <text x="205" y="402" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">Uncertain: 64</text>

  <text x="30" y="380" font-size="10" fill="#475569">OPC-UA Quality:</text>
</svg>
